version: '3.8'

# Production deployment configuration for MGA Soap Calculator API
# For production use, ensure all environment variables are set securely
# Use with: docker-compose -f docker-compose.prod.yml up -d

services:
  api:
    image: mga-soap-api:1.0.0
    container_name: mga_soap_api_prod
    environment:
      # REQUIRED: Override these in production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production

      # Application settings
      APP_NAME: MGA Soap Calculator API
      APP_VERSION: 1.0.0

      # CORS - Restrict to your domain
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://yourdomain.com}

      # Performance tuning
      DATABASE_POOL_SIZE: 20
      DATABASE_MAX_OVERFLOW: 10

    ports:
      - "8000:8000"

    # Health check for load balancers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits for container
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

    restart: always

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy for HTTPS and load balancing
  # Uncomment and configure if needed
