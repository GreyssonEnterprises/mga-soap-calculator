apiVersion: v1
kind: Service
metadata:
  name: mga-postgresql
  namespace: mga-soap-calculator
  labels:
    app: mga-postgresql
spec:
  clusterIP: None  # headless for StatefulSet DNS
  ports:
    - port: 5432
      name: postgresql
  selector:
    app: mga-postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mga-postgresql
  namespace: mga-soap-calculator
spec:
  serviceName: mga-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: mga-postgresql
  template:
    metadata:
      labels:
        app: mga-postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.access.redhat.com/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: mga-postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mga-postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mga-postgresql-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: lvms-vg1
        resources:
          requests:
            storage: 5Gi
