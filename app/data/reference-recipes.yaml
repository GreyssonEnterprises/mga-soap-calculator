    detoxifying additive stack (bentonite + kaolin clay, activated
    charcoal, colloidal oats, goat milk powder) and a gentle lavender
    + tea tree essential oil blend. Tamanu oil added at trace as 5%
    superfat. Aimed at facial use, lighter scenting than signature bars.
  lye:
    type: naoh
    naoh_purity: 100
  water:
    method: water_lye_ratio
    value: 1.0
  superfat_percent: 5
  oils:
  - {id: coconut_oil,   percentage: 25.88}
  - {id: avocado_oil,   percentage: 20.88}
  - {id: babassu_oil,   percentage: 10.00}
  - {id: hemp_seed_oil, percentage:  8.00}
  - {id: castor_oil,    percentage:  5.00}
  additives:
  - {id: sodium_lactate,     percentage: 2.0}
  - {id: kaolin_clay,        percentage: 0.37}
  - {id: bentonite_clay,     percentage: 0.37}
  - {id: colloidal_oatmeal,  percentage: 0.29}
  - {id: activated_charcoal, percentage: 0.26}
  - {id: goat_milk_powder,   percentage: 0.59}
  - {id: silk,               percentage: 0.2}
  essential_oils:
  - {id: lavender_essential_oil, name: Lavender EO, percentage: 2.0}
  - {id: tea_tree_essential_oil, name: Tea Tree EO, percentage: 0.5}
  catalog_gaps:
  - beef_tallow (30.24% — saponifiable fat not in oil catalog)
  - tamanu_oil (5% added at trace as superfat — saponifiable fat not in catalog)
  - lavender_essential_oil, tea_tree_essential_oil (essential oils not
    cataloged yet)
  - activated_charcoal (catalog entry exists with id 'activated_charcoal' —
    used both as additive and colorant in recipes)
  notes: |-
    Small test/retail batch: 6 lbs oils (2,722g) vs. 55-lb production
    batches. Clay and oatmeal percentages in the YAML above are
    converted from the source's tablespoon measurements (~10g kaolin,
    ~10g bentonite, ~8g oats, ~7g charcoal, ~16g goat milk over 2,722g
    oils). Tamanu oil (5%) listed as a trace-added superfat in the
    source doc but not in the catalog; currently omitted from oils[]
    and flagged in catalog_gaps. Cold process, 4-6 week cure.
  source_file: lavender-charcoal-clay-facial-bar.md

