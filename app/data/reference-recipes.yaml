# Reference recipes — MGA production soap recipes captured from
# Shale + Jackie's working docs via Patterson.
#
# Purpose
# -------
# These are canonical MGA recipes, preserved in the repository so that:
#
#   1. The application has a known set of realistic inputs for QA /
#      regression testing against the calculator.
#   2. Future frontend work can offer "try one of MGA's recipes" as
#      onboarding examples (with owner approval).
#   3. We can validate calculator parity against the prior workflow
#      (SoapCalc + spreadsheets) by re-running these recipes and
#      diffing quality metrics + lye amounts.
#
# Format
# ------
# Each recipe is a dict with:
#   - id: snake_case slug
#   - common_name: display name Shale + Jackie use
#   - description: short note about the recipe (scent, intent, finish)
#   - lye:
#       type: naoh | koh | mixed
#       naoh_percent / koh_percent (if mixed)
#       naoh_purity / koh_purity (percentages)
#   - water:
#       method: percent_of_oils | lye_concentration | water_lye_ratio
#       value: float (meaning depends on method)
#   - superfat_percent: 0-20 (nominal)
#   - oils: list of {id, percentage}   — ids must match seed-data.yaml
#   - additives (optional): list of {id, percentage}
#   - essential_oils (optional): list of {id, percentage}
#   - notes (optional): freeform text (process steps, cure time, etc.)
#   - catalog_gaps (optional): list of ingredients referenced by the
#     recipe but NOT present in the current catalog. Lets future
#     catalog-expansion work know what to prioritize.
#
# Do NOT edit by hand without Shale or Jackie's approval — these reflect
# real production formulations.

recipes:
- id: midnight_morsels
  common_name: Midnight Morsels
  aliases: [Addies Mints]
  description: >-
    Minty mint soap bar. Babassu-backed hardness, conditioning from
    avocado and hemp, coconut/babassu for cleansing and lather,
    castor to stabilize foam. Cocoa powder for color (post-calc).
    Vanilla oleoresin for scent depth (post-calc, not a saponifiable
    fat).
  lye:
    type: naoh
    naoh_purity: 100
  water:
    method: water_lye_ratio
    value: 1.0
  superfat_percent: 5
  oils:
  - {id: coconut_oil,  percentage: 25.88}
  - {id: cocoa_butter, percentage: 20.00}
  - {id: avocado_oil,  percentage: 26.00}
  - {id: babassu_oil,  percentage: 15.12}
  - {id: castor_oil,   percentage:  5.00}
  - {id: hemp_seed_oil, percentage: 8.00}
  catalog_gaps:
  - vanilla_oleoresin (fragrance/scent component, not a saponifiable oil — category
    TBD, likely Additive with 'fragrance' category or a future EssentialOil-adjacent
    record)
  - cocoa_powder (colorant, post-cook — would live in Colorant table once populated)
  notes: |-
    Calc parity reference recorded by Patterson on 2026-04-18 via Slack,
    from the Midnight Garden Apothecary recipe document. Use for
    regression testing when changing calculation logic.

# ---------------------------------------------------------------------------
# Recipes below transcribed 2026-04-18 from Shale's working docs on
# shale-personal-mini:
#   /Users/shalegreysson/Documents/gdrive-greysson/mga/projects/recipes/
#
# MGA's "Standard Base" formulation (~16 of 17 saponified recipes use it):
#   Beef Tallow   30.24%
#   Coconut Oil   25.88%
#   Avocado Oil   20.88%
#   Babassu Oil   10.00%
#   Hemp Oil       8.00%
#   Castor Oil     5.00%
# Standard lye: 50% concentration (1:1 water:lye), 5% superfat, NaOH only.
# Standard scaffold additives: 2% sodium lactate, 2% kaolin clay, 0.2%
# tussah silk (with variations per recipe).
#
# BIG CATALOG GAP: Beef Tallow is the dominant oil in nearly every MGA
# recipe but is not yet in seed-data.yaml. Flagged in every relevant
# recipe's catalog_gaps.
#
# Three source files were NOT transcribed (not saponified soap recipes —
# they use a pre-made Stephenson Foaming Bath Butter / surfactant base
# and have no lye calculation):
#   - grease monkey grit.md      (sugar scrub on OPC base)
#   - skull-garden-scalp-scrub.md (sugar scrub on OPC base)
#   - whipped-soap-base.md        (surfactant base formulation, no oils)
# These would need a different product-type schema (Surfactant/M&P base).
# ---------------------------------------------------------------------------

- id: cafe_walnut
  common_name: Cafe Walnut
  aliases: [Cafe Walnut Limited Edition]
  description: >-
    Hot-process three-layer coffee-shop bar. Dark coffee bottom, mocha
    middle, creamy ivory top with melt-and-pour coffee bean embeds and
    mica drizzle. Modified MGA base adds walnut oil and roasted coffee
    bean oil (10% combined) for nutty/roasted undertones; caffeine
    powder and cappuccino fragrance layered in.
  lye:
    type: naoh
    naoh_purity: 100
  water:
    method: water_lye_ratio
    value: 1.0
  superfat_percent: 5
  oils:
  - {id: coconut_oil,   percentage: 25.88}
  - {id: avocado_oil,   percentage: 10.88}
  - {id: babassu_oil,   percentage: 10.00}
  - {id: hemp_seed_oil, percentage:  8.00}
  - {id: castor_oil,    percentage:  5.00}
  additives:
  - {id: sodium_lactate, percentage: 2.0}
  - {id: kaolin_clay,    percentage: 2.0}
  - {id: silk,           percentage: 0.2}
  essential_oils: []
  catalog_gaps:
  - beef_tallow (30.24% — saponifiable fat not in oil catalog; BLOCKS recipe
    representation)
  - walnut_oil (5.00% — saponifiable fat not in oil catalog)
  - coffee_bean_oil_roasted (5.00% — saponifiable fat not in oil catalog)
  - caffeine_powder (2% — functional additive not cataloged)
  - cappuccino_fragrance_oil (5% layered; fragrance oils category TBD)
  - cocoa_powder, activated_charcoal_colorant, brown_mica, ivory_mica
    (colorants — out of scope for oils/additives/EO lists)
  notes: |-
    Hot process, 3 layers (33/33/34% batter split). Source calls out
    "Beef Tallow, Walnut Oil, Coffee Bean Oil (Roasted)" as present in
    the 'already in API' list at doc time — those entries have since
    been removed or were never seeded. Oil percentages WILL NOT sum
    to 100 in the YAML block above (80.76%) until tallow/walnut/coffee
    are added to the catalog; validator should treat this recipe as
    catalog-incomplete rather than as a math error. Cure 24-48h min,
    1-2 weeks optimal. Cappuccino FO split 2.5% per bottom/middle
    layer; top layer unscented.
  source_file: cafe-walnut-55lb.md

