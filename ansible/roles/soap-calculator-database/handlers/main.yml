---
# soap-calculator-database role handlers
# Fedora 42 Rootless Podman Configuration

- name: reload systemd and restart postgres
  systemd:
    name: mga-postgres.service
    state: restarted
    daemon_reload: yes
    scope: user
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

- name: restart postgres
  systemd:
    name: mga-postgres.service
    state: restarted
    scope: user
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"
