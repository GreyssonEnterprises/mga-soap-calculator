---
# soap-calculator-database role tasks
# Fedora 42 Rootless Podman Configuration

- name: Create config directory for environment files
  file:
    path: "{{ config_dir }}"
    state: directory
    owner: "{{ grimm_user }}"
    group: "{{ grimm_user }}"
    mode: '0755'
  become: yes

- name: Ensure PostgreSQL data volume exists (user Podman)
  containers.podman.podman_volume:
    name: mga-pgdata
    state: present
    labels:
      app: mga-soap-calculator
      component: database
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

- name: Deploy PostgreSQL environment file
  template:
    src: "{{ playbook_dir }}/../templates/postgres.env.j2"
    dest: "{{ config_dir }}/postgres.env"
    owner: "{{ grimm_user }}"
    group: "{{ grimm_user }}"
    mode: '0600'
  become: yes
  notify: restart postgres

- name: Deploy Quadlet PostgreSQL container unit
  copy:
    src: "{{ playbook_dir }}/../../podman/systemd/mga-postgres.container"
    dest: "{{ quadlet_dir }}/mga-postgres.container"
    owner: "{{ grimm_user }}"
    group: "{{ grimm_user }}"
    mode: '0644'
  become: yes
  notify: reload systemd and restart postgres

- name: Reload systemd user daemon
  systemd:
    daemon_reload: yes
    scope: user
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

- name: Enable and start PostgreSQL service
  systemd:
    name: mga-postgres.service
    enabled: yes
    state: started
    scope: user
    daemon_reload: yes
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

- name: Wait for PostgreSQL to be healthy (user Podman)
  command: podman healthcheck run mga-postgres
  register: pg_health
  retries: 30
  delay: 2
  until: pg_health.rc == 0
  changed_when: false
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"
