---
# Validate deployment health and trigger rollback on failure

- name: Wait for API health endpoint to respond
  uri:
    url: "{{ health_check_url }}"
    status_code: 200
    timeout: "{{ health_check_timeout }}"
  register: health_check
  retries: "{{ health_check_retries }}"
  delay: "{{ health_check_delay }}"
  until: health_check.status == 200
  ignore_errors: true

- name: Display health check result
  debug:
    msg: "{{ 'Health check PASSED' if health_check.status == 200 else 'Health check FAILED' }}"

- name: Validate new API endpoints
  uri:
    url: "http://127.0.0.1:8000/{{ item }}"
    status_code: 200
    timeout: 5
  register: endpoint_check
  loop: "{{ validation_endpoints }}"
  ignore_errors: true
  when: health_check.status == 200

- name: Display endpoint validation results
  debug:
    msg: |
      {% for result in endpoint_check.results %}
      {{ result.item }}: {{ 'PASS' if result.status == 200 else 'FAIL' }}
      {% endfor %}
  when: endpoint_check is defined

- name: Check for validation failures
  set_fact:
    validation_failed: "{{ health_check.failed or (endpoint_check.failed | default(false)) }}"

- name: Trigger rollback if validation failed
  include_tasks: rollback.yml
  when: validation_failed | bool

- name: Mark deployment as successful
  set_fact:
    deployment_status: "success"
    deployment_version: "{{ image_version }}"
  when: not (validation_failed | bool)

- name: Display deployment status
  debug:
    msg: |
      ========================================
      Deployment Status: {{ 'SUCCESS' if not (validation_failed | bool) else 'FAILED' }}
      Version: {{ image_version }}
      Health URL: {{ health_check_url }}
      ========================================
