---
# soap-calculator-network role tasks
# Fedora 42 Rootless Podman Configuration

- name: Enable linger for grimm user (persistent user services)
  command: loginctl enable-linger {{ grimm_user }}
  become: yes
  changed_when: false
  ignore_errors: yes  # May already be enabled

- name: Create Quadlet systemd directory
  file:
    path: "{{ quadlet_dir }}"
    state: directory
    owner: "{{ grimm_user }}"
    group: "{{ grimm_user }}"
    mode: '0755'
  become: yes

- name: Deploy Quadlet network unit
  copy:
    src: "{{ playbook_dir }}/../../podman/systemd/mga-network.network"
    dest: "{{ quadlet_dir }}/mga-network.network"
    owner: "{{ grimm_user }}"
    group: "{{ grimm_user }}"
    mode: '0644'
  become: yes
  notify: reload systemd user

- name: Reload systemd user daemon
  systemd:
    daemon_reload: yes
    scope: user
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

- name: Enable and start network service
  systemd:
    name: mga-network.service
    enabled: yes
    state: started
    scope: user
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

- name: Verify network is created (user Podman)
  command: podman network ls --format json
  register: network_list
  changed_when: false
  become: yes
  become_user: "{{ grimm_user}}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

- name: Parse network list
  set_fact:
    networks: "{{ network_list.stdout | from_json }}"

- name: Confirm mga-web network exists
  assert:
    that:
      - networks | selectattr('Name', 'equalto', 'mga-web') | list | length > 0
    fail_msg: "mga-web network was not created by Quadlet"
    success_msg: "mga-web network confirmed"
