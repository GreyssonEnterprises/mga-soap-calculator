---
# soap-calculator-network role handlers
# Fedora 42 Rootless Podman Configuration

- name: reload systemd
  systemd:
    daemon_reload: yes
    scope: user
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

- name: reload systemd user
  systemd:
    daemon_reload: yes
    scope: user
  become: yes
  become_user: "{{ grimm_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"
