---
# soap-calculator-monitoring role tasks

- name: Verify PostgreSQL service is active
  systemd:
    name: mga-postgres.service
  register: pg_status
  failed_when: pg_status.status.ActiveState != 'active'

- name: Verify API service is active
  systemd:
    name: soap-calculator-api.service
  register: api_status
  failed_when: api_status.status.ActiveState != 'active'

- name: Check API health endpoint
  uri:
    url: http://127.0.0.1:8000/health
    status_code: 200
    return_content: true
  register: health_response

- name: Validate health response structure
  assert:
    that:
      - health_response.json.status == 'healthy'
      - health_response.json.service == 'mga-soap-calculator-api'
    fail_msg: "API health check failed validation"

- name: Check PostgreSQL container health
  command: podman healthcheck run mga-postgres
  register: pg_healthcheck
  changed_when: false
  failed_when: pg_healthcheck.rc != 0

- name: Report monitoring status
  debug:
    msg:
      - "=========================================="
      - "Health Monitoring Report"
      - "=========================================="
      - "PostgreSQL: {{ pg_status.status.ActiveState }}"
      - "API Service: {{ api_status.status.ActiveState }}"
      - "API Health: {{ health_response.json.status }}"
      - "Database: {{ health_response.json.database | default('OK') }}"
      - "=========================================="
