---
- name: Rollback MGA API to Previous Version
  hosts: mga_production
  become: true

  vars:
    rollback_tag: previous  # or specify version like v1.2.3-20251102

  tasks:
    # ========================================
    # 1. Stop API Service
    # ========================================
    - name: Stop API service
      systemd:
        name: soap-calculator-api.service
        state: stopped

    # ========================================
    # 2. Tag Current Image as Broken (Audit Trail)
    # ========================================
    - name: Tag current image as broken for audit trail
      command: >
        podman tag localhost/mga-soap-calculator:latest
        localhost/mga-soap-calculator:broken-{{ ansible_date_time.epoch }}
      ignore_errors: true

    # ========================================
    # 3. Restore Previous Version to Latest
    # ========================================
    - name: Restore previous version to latest tag
      command: >
        podman tag localhost/mga-soap-calculator:{{ rollback_tag }}
        localhost/mga-soap-calculator:latest

    # ========================================
    # 4. Start API Service with Rollback Image
    # ========================================
    - name: Start API service with rollback image
      systemd:
        name: soap-calculator-api.service
        state: started

    # ========================================
    # 5. Wait for API Health Check
    # ========================================
    - name: Wait for API health check after rollback
      uri:
        url: http://127.0.0.1:8000/health
        status_code: 200
        timeout: 10
      retries: 20
      delay: 3
      until: api_health.status == 200
      register: api_health

    # ========================================
    # 6. Report Rollback Success
    # ========================================
    - name: Report rollback success
      debug:
        msg:
          - "=========================================="
          - "Rollback to {{ rollback_tag }} completed successfully"
          - "=========================================="
          - "API Health: {{ api_health.json.status }}"
          - "Timestamp: {{ ansible_date_time.iso8601 }}"
          - "=========================================="
          - "IMPORTANT: Investigate broken image and root cause"
          - "Broken image tagged as: broken-{{ ansible_date_time.epoch }}"
          - "=========================================="
