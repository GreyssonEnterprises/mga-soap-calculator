---
- name: Deploy MGA SOAP Calculator (API + PostgreSQL Containers)
  hosts: mga_production
  become: false  # Rootless Podman - user scope only
  vars_files:
    - ../group_vars/production/vault.yml

  vars:
    db_name: "mga_soap_calculator"
    api_image: "localhost/mga-soap-calculator:latest"
    api_workers: 2
    log_level: "INFO"
    config_dir: "/home/grimm/.config/mga-soap-calculator"
    quadlet_dir: "/home/grimm/.config/containers/systemd"
    grimm_uid: 1000  # VERIFIED actual UID

  tasks:
    # ========================================
    # 1. Prerequisites and Directory Setup
    # ========================================
    - name: Enable persistent user services (linger)
      command: loginctl enable-linger grimm
      become: true
      changed_when: false

    - name: Ensure configuration directory exists
      file:
        path: "{{ config_dir }}"
        state: directory
        owner: grimm
        group: grimm
        mode: '0755'

    # ========================================
    # 2. Volume Creation
    # ========================================
    - name: Ensure PostgreSQL data volume exists
      containers.podman.podman_volume:
        name: mga-pgdata
        state: present
        label:
          app: mga-soap-calculator
          component: database
      become: true
      become_user: grimm
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

    # ========================================
    # 2.5. Network Creation
    # ========================================
    - name: Create Podman network for services
      containers.podman.podman_network:
        name: mga-web
        state: present
        driver: bridge
        subnet: 10.90.0.0/24
        gateway: 10.90.0.1
        ipv6: false
        interface_name: br-mga
      become: true
      become_user: grimm
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

    # ========================================
    # 3. Deploy Environment Files (with secrets from vault)
    # ========================================
    - name: Deploy PostgreSQL environment file
      template:
        src: ../templates/postgres.env.j2
        dest: "{{ config_dir }}/postgres.env"
        owner: grimm
        group: grimm
        mode: '0600'
      notify: restart postgres service

    - name: Deploy API environment file
      template:
        src: ../templates/api.env.j2
        dest: "{{ config_dir }}/api.env"
        owner: grimm
        group: grimm
        mode: '0600'
      notify: restart api service

    # ========================================
    # 4. Deploy Quadlet Container Units
    # ========================================
    - name: Deploy Quadlet network unit
      copy:
        src: ../../podman/systemd/mga-network.network
        dest: "{{ quadlet_dir }}/mga-network.network"
        owner: grimm
        group: grimm
        mode: '0644'
      notify: daemon-reload

    - name: Deploy Quadlet PostgreSQL container unit
      copy:
        src: ../../podman/systemd/mga-postgres.container
        dest: "{{ quadlet_dir }}/mga-postgres.container"
        owner: grimm
        group: grimm
        mode: '0644'
      notify: daemon-reload

    - name: Deploy Quadlet API container unit
      copy:
        src: ../../podman/systemd/soap-calculator-api.container
        dest: "{{ quadlet_dir }}/soap-calculator-api.container"
        owner: grimm
        group: grimm
        mode: '0644'
      notify: daemon-reload

    # ========================================
    # 5. Systemd Daemon Reload (flush handlers)
    # ========================================
    - name: Reload systemd daemon to recognize new Quadlet units
      meta: flush_handlers

    # ========================================
    # 6. Enable and Start PostgreSQL Service
    # ========================================
    - name: Enable and start PostgreSQL service
      systemd:
        name: mga-postgres.service
        enabled: true
        state: started
        daemon_reload: true
        scope: user
      become: true
      become_user: grimm
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

    # ========================================
    # 7. Wait for PostgreSQL Health Check
    # ========================================
    - name: Wait for PostgreSQL to be healthy
      command: podman healthcheck run mga-postgres
      register: pg_health
      retries: 30
      delay: 2
      until: pg_health.rc == 0
      changed_when: false
      become: true
      become_user: grimm
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

    # ========================================
    # 8. Enable and Start API Service
    # ========================================
    - name: Enable and start API service
      systemd:
        name: soap-calculator-api.service
        enabled: true
        state: started
        daemon_reload: true
        scope: user
      become: true
      become_user: grimm
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

    # ========================================
    # 9. Wait for API Health Endpoint
    # ========================================
    - name: Wait for API health endpoint
      uri:
        url: http://127.0.0.1:8000/health
        status_code: 200
        timeout: 10
      register: api_health
      retries: 30
      delay: 2
      until: api_health.status == 200

    # ========================================
    # 10. Deployment Verification
    # ========================================
    - name: Verify deployment success
      debug:
        msg: "MGA SOAP Calculator deployment successful. API healthy at http://127.0.0.1:8000"

  # ========================================
  # Handlers
  # ========================================
  handlers:
    - name: daemon-reload
      systemd:
        daemon_reload: true
        scope: user
      become: true
      become_user: grimm
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

    - name: restart postgres service
      systemd:
        name: mga-postgres.service
        state: restarted
        scope: user
      become: true
      become_user: grimm
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"

    - name: restart api service
      systemd:
        name: soap-calculator-api.service
        state: restarted
        scope: user
      become: true
      become_user: grimm
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ grimm_uid }}"
