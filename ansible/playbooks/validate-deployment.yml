---
- name: Validate MGA SOAP Calculator Deployment
  hosts: mga_production
  become: true

  tasks:
    # ========================================
    # 1. Service Status Checks
    # ========================================
    - name: Check PostgreSQL service status
      systemd:
        name: mga-postgres.service
      register: pg_status
      failed_when: pg_status.status.ActiveState != 'active'

    - name: Check API service status
      systemd:
        name: soap-calculator-api.service
      register: api_status
      failed_when: api_status.status.ActiveState != 'active'

    # ========================================
    # 2. Health Endpoint Validation
    # ========================================
    - name: Verify API health endpoint
      uri:
        url: http://127.0.0.1:8000/health
        status_code: 200
        return_content: true
      register: health_check
      failed_when: health_check.json.status != 'healthy'

    # ========================================
    # 3. Database Connectivity
    # ========================================
    - name: Verify PostgreSQL health check
      command: podman healthcheck run mga-postgres
      register: pg_healthcheck
      failed_when: pg_healthcheck.rc != 0
      changed_when: false

    # ========================================
    # 4. Log Inspection for Errors
    # ========================================
    - name: Inspect API container logs for errors
      command: journalctl -u soap-calculator-api.service -n 50 --no-pager
      register: api_logs
      changed_when: false
      failed_when: "'ERROR' in api_logs.stdout or 'CRITICAL' in api_logs.stdout"

    - name: Inspect PostgreSQL logs for errors
      command: journalctl -u mga-postgres.service -n 50 --no-pager
      register: pg_logs
      changed_when: false
      failed_when: "'FATAL' in pg_logs.stdout or 'PANIC' in pg_logs.stdout"

    # ========================================
    # 5. Container Status Check
    # ========================================
    - name: Verify containers are running with health status
      command: podman ps --filter name=mga-postgres --filter name=soap-api --format json
      register: container_status
      changed_when: false

    - name: Parse and validate container health
      set_fact:
        containers: "{{ container_status.stdout | from_json }}"

    - name: Ensure both containers are healthy
      assert:
        that:
          - containers | length == 2
          - containers | selectattr('Names', 'contains', 'mga-postgres') | list | length == 1
          - containers | selectattr('Names', 'contains', 'soap-api') | list | length == 1
        fail_msg: "Not all required containers are running"

    # ========================================
    # 6. Report Deployment Validation Success
    # ========================================
    - name: Report deployment validation success
      debug:
        msg:
          - "=========================================="
          - "Deployment Validated Successfully"
          - "=========================================="
          - "PostgreSQL Service: {{ pg_status.status.ActiveState }}"
          - "API Service: {{ api_status.status.ActiveState }}"
          - "API Health: {{ health_check.json.status }}"
          - "Database Connected: {{ health_check.json.database | default('OK') }}"
          - "Containers Running: {{ containers | length }}"
          - "No Critical Errors in Logs"
          - "=========================================="
