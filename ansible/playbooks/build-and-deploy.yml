---
- name: Build, Transfer, and Deploy MGA Soap Calculator Container Image
  hosts: mga_production
  vars_files:
    - ../group_vars/production/vault.yml

  vars:
    app_version: "1.0.0"  # INCREMENT THIS FOR EACH RELEASE
    grimm_uid: 1000

  tasks:
    # ========================================
    # Phase 1: Local Build
    # ========================================
    - name: Build container image locally
      block:
        - include_role:
            name: soap-calculator-image-lifecycle
            tasks_from: build
      delegate_to: localhost
      run_once: true

    # ========================================
    # Phase 2: Transfer to Production Server
    # ========================================
    - name: Transfer image archive to grimm-lin
      include_role:
        name: soap-calculator-image-lifecycle
        tasks_from: transfer

    # ========================================
    # Phase 3: Deploy to Production
    # ========================================
    - name: Deploy new image to Podman and restart services
      include_role:
        name: soap-calculator-image-lifecycle
        tasks_from: deploy

    # ========================================
    # Phase 4: Validation
    # ========================================
    - name: Validate deployment health
      include_role:
        name: soap-calculator-image-lifecycle
        tasks_from: validate

    # ========================================
    # Phase 5: Cleanup (only on success)
    # ========================================
    - name: Clean up local build artifacts
      block:
        - file:
            path: /tmp/mga-builds
            state: absent
      delegate_to: localhost
      when: deployment_status is defined and deployment_status == "success"

    - name: Clean up old image archives on grimm-lin
      shell: |
        cd /data/podman-apps/mga-soap-calculator/images
        ls -t mga-soap-calculator-*.tar.gz | tail -n +{{ keep_archives_count + 1 }} | xargs -r rm
      args:
        warn: false
      when: deployment_status is defined and deployment_status == "success"
      changed_when: false

    # ========================================
    # Final Status
    # ========================================
    - name: Deployment Summary
      debug:
        msg: |
          ========================================
          MGA SOAP CALCULATOR DEPLOYMENT SUMMARY
          ========================================
          Status: {{ deployment_status | upper }}
          Version: {{ deployment_version }}
          API Health: {{ health_check_url }}
          Image Storage: /data/podman-apps/mga-soap-calculator

          Verification Commands:
          - podman images localhost/mga-soap-calculator
          - systemctl --user status soap-calculator-api.service
          - curl {{ health_check_url }}
          - journalctl --user -u soap-calculator-api.service -n 50
          ========================================
