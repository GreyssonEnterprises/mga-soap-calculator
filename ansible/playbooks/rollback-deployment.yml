---
- name: Emergency Rollback - MGA Soap Calculator API
  hosts: mga_production
  vars_files:
    - ../group_vars/production/vault.yml

  vars:
    grimm_uid: 1000

  tasks:
    - name: Confirm rollback operation
      pause:
        prompt: |
          ========================================
          EMERGENCY ROLLBACK CONFIRMATION
          ========================================
          This will restore the previous version of the API.
          Current version will be lost unless archived.

          Press Enter to continue or Ctrl+C to abort.
          ========================================

    - name: Execute rollback procedure
      include_role:
        name: soap-calculator-image-lifecycle
        tasks_from: rollback

    - name: Rollback Summary
      debug:
        msg: |
          ========================================
          ROLLBACK COMPLETE
          ========================================
          Previous version has been restored.

          Verification:
          - systemctl --user status soap-calculator-api.service
          - curl http://127.0.0.1:8000/health
          - journalctl --user -u soap-calculator-api.service -n 100

          Review logs before attempting new deployment.
          ========================================
